context:
  version: "0.21.0"

package:
  name: numa
  version: ${{ version }}

source:
  url: https://github.com/razvandimescu/numa/archive/v${{ version }}.tar.gz
  sha256: 3eedd3cc3fa8642d636ecc3c0faeca9686d87392c20984b71e8b7c7e7ef23a6b

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install -j ${CPU_COUNT} --root "${PREFIX}" --path . --locked --no-track
        else:
          - cargo auditable install -j %CPU_COUNT% --root "%PREFIX%" --path . --locked --no-track
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script:
      - numa --version
      - numa --help
  - package_contents:
      strict: true
      bin:
        - numa

about:
  homepage: https://numa.rs/
  summary: "Portable DNS resolver in Rust — .numa local domains, ad blocking, developer overrides."
  description: |
    A portable DNS resolver in a single binary. Block ads on any network, name your local services (frontend.numa), override any hostname with auto-revert, and seal every outbound query with ODoH (RFC 9230) so no single party sees both who you are and what you asked — all from your laptop, no cloud account or Raspberry Pi required.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/razvandimescu/numa

extra:
  recipe-maintainers:
    - XhstormR
